<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUM 135 · Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0d1b2e;
  --navy-mid: #152439;
  --navy-light: #1e3252;
  --gold: #c9a84c;
  --gold-light: #e2c97e;
  --gold-dim: rgba(201,168,76,0.15);
  --cream: #f5eed8;
  --cream-dim: rgba(245,238,216,0.07);
  --text: #e8dfc8;
  --text-muted: rgba(232,223,200,0.55);
  --text-faint: rgba(232,223,200,0.3);
  --success: #5dbf8a;
  --danger: #e06c75;
  --border: rgba(201,168,76,0.2);
  --radius: 12px;
  --radius-lg: 18px;
}

*{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy);
  color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 90% 90%, rgba(201,168,76,0.04) 0%, transparent 60%);
}

/* ─── HEADER ─────────────────────────────────── */
.header {
  text-align: center;
  padding: 36px 20px 0;
  position: relative;
}
.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold);
  background: var(--gold-dim);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 4px 14px;
  margin-bottom: 14px;
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 5vw, 44px);
  font-weight: 700;
  color: var(--cream);
  line-height: 1.1;
  letter-spacing: -0.01em;
}
.header h1 em {
  font-style: italic;
  color: var(--gold-light);
}
.header-sub {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 6px;
  letter-spacing: 0.02em;
}
.gold-line {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 18px auto 0;
}

/* ─── TABS ────────────────────────────────────── */
.tabs {
  display: flex;
  justify-content: center;
  gap: 4px;
  padding: 20px 20px 0;
  flex-wrap: wrap;
}
.tab {
  padding: 9px 22px;
  border: 1px solid transparent;
  border-radius: 99px;
  background: transparent;
  cursor: pointer;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.03em;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tab:hover { color: var(--text); background: var(--cream-dim); }
.tab.active {
  background: var(--gold-dim);
  color: var(--gold-light);
  border-color: var(--border);
}
.tab-icon { font-size: 15px; }

/* ─── APP BODY ────────────────────────────────── */
.app {
  max-width: 820px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

.screen { display: none; }
.screen.visible { display: block; animation: fadeUp 0.3s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── FILTER ROW ──────────────────────────────── */
.filter-row {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 5px 14px;
  border: 1px solid var(--border);
  border-radius: 99px;
  background: transparent;
  cursor: pointer;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text-muted);
  letter-spacing: 0.03em;
  transition: all 0.2s;
}
.filter-btn:hover { color: var(--text); border-color: rgba(201,168,76,0.4); }
.filter-btn.on {
  background: var(--gold-dim);
  color: var(--gold-light);
  border-color: var(--gold);
}

/* ─── SEARCH ──────────────────────────────────── */
.search-wrap {
  position: relative;
  margin-bottom: 16px;
}
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-faint);
  font-size: 16px;
  pointer-events: none;
}
.search-bar {
  width: 100%;
  padding: 11px 14px 11px 40px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--navy-mid);
  color: var(--text);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.search-bar::placeholder { color: var(--text-faint); }
.search-bar:focus { border-color: rgba(201,168,76,0.5); }

/* ─── BROWSE GRID ─────────────────────────────── */
.word-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 10px;
  max-height: 520px;
  overflow-y: auto;
  padding-right: 4px;
}
.word-list::-webkit-scrollbar { width: 4px; }
.word-list::-webkit-scrollbar-track { background: transparent; }
.word-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.word-card {
  background: var(--navy-mid);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s, background 0.2s;
  position: relative;
  overflow: hidden;
}
.word-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  opacity: 0;
  transition: opacity 0.2s;
}
.word-card:hover { border-color: rgba(201,168,76,0.45); transform: translateY(-1px); }
.word-card:hover::before { opacity: 1; }
.wc-word {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--cream);
}
.wc-type {
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 0.06em;
  margin-top: 2px;
  text-transform: uppercase;
}
.wc-def {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 8px;
  line-height: 1.5;
  display: none;
}
.wc-ex {
  font-style: italic;
  font-size: 12px;
  color: var(--text-faint);
  margin-top: 5px;
  line-height: 1.5;
}
.word-card.expanded .wc-def { display: block; }
.wc-tag {
  display: inline-block;
  font-size: 10px;
  padding: 2px 9px;
  border-radius: 99px;
  margin-top: 8px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.wc-tag.vocab  { background: rgba(93,191,138,0.15); color: #5dbf8a; }
.wc-tag.exam   { background: rgba(201,168,76,0.15);  color: var(--gold); }
.wc-tag.phrase { background: rgba(147,130,200,0.15); color: #a99cdb; }
.wc-tag.top100 { background: rgba(224,108,117,0.18); color: #e06c75; }
.pron-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 15px;
  margin-left: 8px;
  vertical-align: middle;
  opacity: 0.7;
  transition: opacity 0.2s, transform 0.15s;
  padding: 0 2px;
  line-height: 1;
}
.pron-btn:hover { opacity: 1; transform: scale(1.2); }
.fc-pron-btn {
  margin-top: 14px;
  padding: 7px 20px;
  border: 1px solid var(--border);
  border-radius: 99px;
  background: var(--navy);
  color: var(--gold);
  cursor: pointer;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.04em;
  transition: all 0.2s;
}
.fc-pron-btn:hover { background: var(--gold-dim); border-color: rgba(201,168,76,0.5); }
.browse-count {
  font-size: 12px;
  color: var(--text-faint);
  margin-top: 12px;
  text-align: right;
}

/* ─── FLASHCARD ───────────────────────────────── */
.fc-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}
.mode-sel {
  display: flex;
  gap: 6px;
  margin-bottom: 4px;
}
.mode-btn {
  padding: 7px 16px;
  border: 1px solid var(--border);
  border-radius: 99px;
  background: transparent;
  cursor: pointer;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text-muted);
  transition: all 0.2s;
}
.mode-btn.on {
  background: rgba(201,168,76,0.12);
  color: var(--gold-light);
  border-color: var(--gold);
}

.fc-card {
  width: 100%;
  max-width: 580px;
  min-height: 240px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--navy-mid);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 36px 32px;
  text-align: center;
  position: relative;
  transition: background 0.3s, border-color 0.3s, transform 0.15s;
  box-shadow: 0 8px 40px rgba(0,0,0,0.35);
}
.fc-card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, rgba(201,168,76,0.04) 0%, transparent 60%);
  pointer-events: none;
}
.fc-card:hover { transform: translateY(-2px); border-color: rgba(201,168,76,0.4); }
.fc-card.revealed {
  background: var(--navy-light);
  border-color: rgba(201,168,76,0.35);
}

.fc-word {
  font-family: 'Playfair Display', serif;
  font-size: clamp(26px, 5vw, 36px);
  font-weight: 700;
  color: var(--cream);
  line-height: 1.2;
}
.fc-type {
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 6px;
}
.fc-def {
  font-size: 17px;
  line-height: 1.65;
  color: var(--text);
  font-family: 'Playfair Display', serif;
}
.fc-ex {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 12px;
  font-style: italic;
  line-height: 1.5;
}
.fc-hint {
  position: absolute;
  bottom: 14px;
  right: 18px;
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: 0.04em;
}

.fc-nav {
  display: flex;
  gap: 12px;
  align-items: center;
}
.fc-nav button, .shuffle-btn {
  padding: 9px 22px;
  border: 1px solid var(--border);
  border-radius: 99px;
  background: var(--navy-mid);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  transition: all 0.2s;
}
.fc-nav button:hover, .shuffle-btn:hover {
  background: var(--gold-dim);
  border-color: rgba(201,168,76,0.5);
  color: var(--gold-light);
}
.fc-counter {
  font-size: 13px;
  color: var(--text-muted);
  min-width: 80px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
.shuffle-btn { font-size: 12px; padding: 7px 18px; }

/* ─── QUIZ ────────────────────────────────────── */
.progress-wrap { margin-bottom: 20px; }
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.progress-bar {
  height: 4px;
  background: rgba(255,255,255,0.07);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  border-radius: 4px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}
.mc-score {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 4px;
  letter-spacing: 0.02em;
}
.mc-q {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 400;
  color: var(--cream);
  line-height: 1.45;
  margin-bottom: 22px;
}
.mc-q strong { font-weight: 700; color: var(--gold-light); }
.mc-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
@media(max-width:480px){ .mc-options { grid-template-columns: 1fr; } }
.mc-opt {
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--navy-mid);
  cursor: pointer;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  text-align: left;
  line-height: 1.45;
  color: var(--text);
  transition: all 0.18s;
}
.mc-opt:hover:not(:disabled) {
  background: var(--gold-dim);
  border-color: rgba(201,168,76,0.5);
  color: var(--gold-light);
}
.mc-opt.correct {
  background: rgba(93,191,138,0.12);
  border-color: #5dbf8a;
  color: #5dbf8a;
}
.mc-opt.wrong {
  background: rgba(224,108,117,0.12);
  border-color: var(--danger);
  color: var(--danger);
}
.mc-opt:disabled { cursor: default; }
.mc-feedback {
  font-size: 14px;
  min-height: 22px;
  margin-bottom: 10px;
  font-weight: 500;
}
.btn-next, .btn-primary {
  padding: 10px 26px;
  background: var(--gold-dim);
  color: var(--gold-light);
  border: 1px solid var(--gold);
  border-radius: 99px;
  cursor: pointer;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  letter-spacing: 0.03em;
  transition: all 0.2s;
}
.btn-next:hover, .btn-primary:hover {
  background: rgba(201,168,76,0.25);
  color: var(--cream);
}
.result-card {
  text-align: center;
  padding: 48px 32px;
  background: var(--navy-mid);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  position: relative;
  overflow: hidden;
}
.result-card::before {
  content: '';
  position: absolute;
  top: -40px; left: 50%;
  transform: translateX(-50%);
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.result-pct {
  font-family: 'Playfair Display', serif;
  font-size: 72px;
  font-weight: 700;
  color: var(--gold-light);
  line-height: 1;
  position: relative;
}
.result-sub {
  font-size: 15px;
  color: var(--text-muted);
  margin: 10px 0 28px;
}

/* ─── STATS ───────────────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 28px;
}
.stat-box {
  background: var(--navy-mid);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 14px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.stat-box::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  font-weight: 700;
  color: var(--gold-light);
}
.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.missed-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  color: var(--cream);
  margin-bottom: 14px;
}
.missed-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.missed-chip {
  padding: 5px 13px;
  border: 1px solid rgba(224,108,117,0.4);
  border-radius: 99px;
  background: rgba(224,108,117,0.1);
  color: var(--danger);
  font-size: 12px;
}
.stats-reset { margin-top: 24px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">✦ Study Tool</div>
  <h1>HUM 135 <em>Vocabulary</em></h1>
  <p class="header-sub">Master your word list — browse, drill, and quiz yourself</p>
  <div class="gold-line"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showScreen('browse',this)"><span class="tab-icon">📖</span>Browse</button>
  <button class="tab" onclick="showScreen('flash',this)"><span class="tab-icon">🃏</span>Flashcards</button>
  <button class="tab" onclick="showScreen('quiz',this)"><span class="tab-icon">⚡</span>Quiz</button>
  <button class="tab" onclick="showScreen('stats',this)"><span class="tab-icon">📊</span>Progress</button>
</div>

<div class="app">

<!-- BROWSE -->
<div id="browse" class="screen visible">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-bar" type="text" placeholder="Search words or definitions…" oninput="filterWords(this.value)" id="searchInput">
  </div>
  <div class="filter-row">
    <button class="filter-btn on" onclick="toggleFilter('all',this)">All</button>
    <button class="filter-btn" onclick="toggleFilter('vocab',this)">Vocab List</button>
    <button class="filter-btn" onclick="toggleFilter('exam',this)">Past Paper Words</button>
    <button class="filter-btn" onclick="toggleFilter('top100',this)">🔥 Top 100</button>
    <button class="filter-btn" onclick="toggleFilter('phrase',this)">Phrases</button>
  </div>
  <div id="wordList" class="word-list"></div>
  <p id="browseCount" class="browse-count"></p>
</div>

<!-- FLASHCARDS -->
<div id="flash" class="screen">
  <div class="mode-sel">
    <button class="mode-btn on" onclick="setFlashMode('word',this)">Word → Definition</button>
    <button class="mode-btn" onclick="setFlashMode('def',this)">Definition → Word</button>
  </div>
  <div class="filter-row">
    <button class="filter-btn on" onclick="setFlashFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFlashFilter('vocab',this)">Vocab List</button>
    <button class="filter-btn" onclick="setFlashFilter('exam',this)">Past Paper Words</button>
    <button class="filter-btn" onclick="setFlashFilter('top100',this)">🔥 Top 100</button>
  </div>
  <div class="fc-container">
    <div class="fc-card" id="fcCard" onclick="flipCard()">
      <div id="fcFront" class="fc-front">
        <div class="fc-word" id="fcWord"></div>
        <div class="fc-type" id="fcType"></div>
      </div>
      <div id="fcBack" class="fc-back" style="display:none">
        <div class="fc-def" id="fcDef"></div>
        <div class="fc-ex" id="fcEx"></div>
      </div>
      <div class="fc-hint" id="fcHint">tap to reveal</div>
    </div>
    <div class="fc-nav">
      <button onclick="prevCard()">← Prev</button>
      <div class="fc-counter" id="fcCounter"></div>
      <button onclick="nextCard()">Next →</button>
    </div>
    <button class="shuffle-btn" onclick="shuffleCards()">🔀 Shuffle</button>
    <div id="fcPronWrap" style="text-align:center"></div>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="filter-row">
    <button class="filter-btn on" onclick="setQuizFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setQuizFilter('vocab',this)">Vocab List</button>
    <button class="filter-btn" onclick="setQuizFilter('exam',this)">Past Paper Words</button>
    <button class="filter-btn" onclick="setQuizFilter('top100',this)">🔥 Top 100</button>
  </div>
  <div id="quizArea"></div>
</div>

<!-- STATS -->
<div id="stats" class="screen">
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="stTotal">0</div><div class="stat-label">Total Words</div></div>
    <div class="stat-box"><div class="stat-num" id="stQuizzed">0</div><div class="stat-label">Quizzed</div></div>
    <div class="stat-box"><div class="stat-num" id="stScore">—</div><div class="stat-label">Accuracy</div></div>
  </div>
  <p class="missed-title">Recently Missed</p>
  <div id="missedList" class="missed-list"></div>
  <div class="stats-reset">
    <button class="btn-primary" onclick="resetStats()">Reset Progress</button>
  </div>
</div>

</div><!-- .app -->

<script>
const WORDS=[
{w:"Abate",t:"v.",d:"To lessen; to subside.",ex:"John pulled over to wait until the storm abated.",src:"vocab"},
{w:"Abet",t:"v.",d:"To help; to aid.",ex:"It is unlawful to aid and abet a criminal.",src:"vocab"},
{w:"Abhor",t:"v.",d:"To hate; to detest.",ex:"She abhorred all forms of discrimination.",src:"vocab"},
{w:"Abject",t:"adj.",d:"Miserable; wretched.",ex:"They were living in abject poverty.",src:"vocab"},
{w:"Abruptly",t:"adv.",d:"Suddenly; unexpectedly.",ex:"The driver stopped the cab so abruptly he was hit.",src:"vocab"},
{w:"Absorbed",t:"adj.",d:"Interested; engrossed.",ex:"Bill did not hear the phone because he was absorbed in his reading.",src:"vocab"},

{w:"Inevitable",t:"adj.",d:"Unable to be avoided.",ex:"Change is inevitable in any growing organisation.",src:"top100"},
{w:"Meagre",t:"adj.",d:"Lacking in quantity; scanty.",ex:"His meagre salary was barely enough to cover rent.",src:"top100"},

{w:"Rampant",t:"adj.",d:"Widespread and uncontrolled.",ex:"Corruption was rampant throughout the institution.",src:"top100"},
{w:"Spontaneous",t:"adj.",d:"Done naturally without planning.",ex:"The crowd broke into spontaneous applause.",src:"top100"},
{w:"Tranquil",t:"adj.",d:"Free from disturbance; calm.",ex:"The lake at dawn was tranquil and beautiful.",src:"top100"},

{w:"Vivid",t:"adj.",d:"Producing powerful feelings; very bright.",ex:"She had vivid memories of her childhood in the village.",src:"top100"}
];

// Prioritise top100 > exam > vocab > phrase so dedup keeps the highest-priority tag
const srcPriority={top100:0,exam:1,vocab:2,phrase:3};
WORDS.sort((a,b)=>(srcPriority[a.src]??9)-(srcPriority[b.src]??9));
const unique=[];const seen=new Set();
WORDS.forEach(w=>{if(!seen.has(w.w)){seen.add(w.w);unique.push(w);}});
const allWords=unique;

// ── BRITISH PRONUNCIATION via Web Speech API ────────────────────────
let britishVoice=null;
function loadVoices(){
  const voices=window.speechSynthesis.getVoices();
  britishVoice=voices.find(v=>v.name.includes('Google UK English Female'))
    ||voices.find(v=>v.name.includes('Google UK English Male'))
    ||voices.find(v=>v.lang==='en-GB')
    ||voices.find(v=>v.lang&&v.lang.startsWith('en-GB'))
    ||null;
}
if(window.speechSynthesis){loadVoices();window.speechSynthesis.onvoiceschanged=loadVoices;}
function pronounce(word,btn){
  if(!window.speechSynthesis){alert('Speech synthesis not supported in this browser.');return;}
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(word);
  utt.lang='en-GB';utt.rate=0.82;utt.pitch=1;
  if(britishVoice)utt.voice=britishVoice;
  if(btn){const orig=btn.textContent;btn.textContent='🔊';setTimeout(()=>{btn.textContent=orig;},1300);}
  window.speechSynthesis.speak(utt);
}

let browseFilter='all';
let flashFilter='all';
let flashMode='word';
let quizFilter='all';
let fcIndex=0;
let fcFlipped=false;
let fcDeck=[];
let quizWords=[];
let qIndex=0;
let qScore=0;
let qAnswered=false;
let stats={total:0,correct:0,missed:{}};

function getFiltered(f){
  if(f==='all')return allWords;
  return allWords.filter(w=>w.src===f);
}

function showScreen(id,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('visible'));
  document.getElementById(id).classList.add('visible');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  if(id==='browse')renderWordList();
  if(id==='flash')initFlash();
  if(id==='quiz')startQuiz();
  if(id==='stats')renderStats();
}

function toggleFilter(f,btn){
  browseFilter=f;
  btn.parentElement.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  filterWords(document.getElementById('searchInput').value);
}

function filterWords(q){
  const list=getFiltered(browseFilter);
  const query=q.toLowerCase();
  const filtered=list.filter(w=>w.w.toLowerCase().includes(query)||w.d.toLowerCase().includes(query)||w.ex.toLowerCase().includes(query));
  renderWordListFiltered(filtered);
}

function renderWordList(){
  renderWordListFiltered(getFiltered(browseFilter));
}

function renderWordListFiltered(list){
  const container=document.getElementById('wordList');
  container.innerHTML='';
  list.forEach(word=>{
    const div=document.createElement('div');
    div.className='word-card';
    const tagClass = word.src==='vocab'?'vocab':word.src==='exam'?'exam':word.src==='top100'?'top100':'phrase';
    const tagLabel = word.src==='vocab'?'Vocab':word.src==='exam'?'Past Paper':word.src==='top100'?'🔥 Top 100':'Phrase';
    div.innerHTML=`<div class="wc-word">${word.w}<button class="pron-btn" onclick="event.stopPropagation();pronounce('${word.w.replace(/'/g,"\\'")}',this)" title="Hear British pronunciation">🔈</button></div><div class="wc-type">${word.t}</div><div class="wc-def">${word.d}<div class="wc-ex">${word.ex}</div></div><span class="wc-tag ${tagClass}">${tagLabel}</span>`;
    div.onclick=()=>div.classList.toggle('expanded');
    container.appendChild(div);
  });
  document.getElementById('browseCount').textContent=`Showing ${list.length} of ${allWords.length} words`;
}

function setFlashFilter(f,btn){
  flashFilter=f;
  btn.parentElement.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  initFlash();
}

function setFlashMode(m,btn){
  flashMode=m;
  btn.parentElement.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  showFlashCard();
}

function initFlash(){
  fcDeck=[...getFiltered(flashFilter)];
  fcIndex=0;fcFlipped=false;showFlashCard();
}

function showFlashCard(){
  if(!fcDeck.length)return;
  const w=fcDeck[fcIndex];
  fcFlipped=false;
  const front=document.getElementById('fcFront');
  const back=document.getElementById('fcBack');
  const hint=document.getElementById('fcHint');
  front.style.display='flex';back.style.display='none';
  const card=document.getElementById('fcCard');
  card.classList.remove('revealed');
  hint.textContent='tap to reveal';
  if(flashMode==='word'){
    document.getElementById('fcWord').textContent=w.w;
    document.getElementById('fcType').textContent=w.t;
    document.getElementById('fcDef').textContent=w.d;
    document.getElementById('fcEx').textContent=w.ex;
  } else {
    document.getElementById('fcWord').textContent=w.d;
    document.getElementById('fcType').textContent='';
    document.getElementById('fcDef').textContent=w.w+' ('+w.t+')';
    document.getElementById('fcEx').textContent=w.ex;
  }
  document.getElementById('fcCounter').textContent=(fcIndex+1)+' / '+fcDeck.length;
  // pronunciation button
  const pronWrap=document.getElementById('fcPronWrap');
  if(pronWrap){pronWrap.innerHTML=`<button class="fc-pron-btn" onclick="pronounce('${w.w.replace(/'/g,"\\'")}',this)">🔈 Hear British Pronunciation</button>`;}
}

function flipCard(){
  fcFlipped=!fcFlipped;
  const front=document.getElementById('fcFront');
  const back=document.getElementById('fcBack');
  const hint=document.getElementById('fcHint');
  const card=document.getElementById('fcCard');
  if(fcFlipped){
    front.style.display='none';back.style.display='flex';
    card.classList.add('revealed');hint.textContent='tap to flip back';
  } else {
    front.style.display='flex';back.style.display='none';
    card.classList.remove('revealed');hint.textContent='tap to reveal';
  }
}

function nextCard(){fcIndex=(fcIndex+1)%fcDeck.length;showFlashCard();}
function prevCard(){fcIndex=(fcIndex-1+fcDeck.length)%fcDeck.length;showFlashCard();}
function shuffleCards(){
  for(let i=fcDeck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[fcDeck[i],fcDeck[j]]=[fcDeck[j],fcDeck[i]];}
  fcIndex=0;showFlashCard();
}

function setQuizFilter(f,btn){
  quizFilter=f;
  btn.parentElement.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  startQuiz();
}

function startQuiz(){
  const pool=[...getFiltered(quizFilter)];
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  quizWords=pool.slice(0,Math.min(10,pool.length));
  qIndex=0;qScore=0;qAnswered=false;
  renderQuiz();
}

function renderQuiz(){
  const area=document.getElementById('quizArea');
  if(qIndex>=quizWords.length){
    const pct=Math.round((qScore/quizWords.length)*100);
    const emoji = pct>=80?'🏆':pct>=60?'👏':'📚';
    area.innerHTML=`<div class="result-card"><div class="result-pct">${pct}%</div><p class="result-sub">${emoji} You got ${qScore} out of ${quizWords.length} correct</p><button class="btn-primary" onclick="startQuiz()">Play Again</button></div>`;
    return;
  }
  const word=quizWords[qIndex];
  const pool=[...allWords.filter(w=>w.w!==word.w)];
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const distractors=pool.slice(0,3).map(w=>w.d);
  const options=[word.d,...distractors];
  for(let i=options.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[options[i],options[j]]=[options[j],options[i]];}
  const prog=Math.round((qIndex/quizWords.length)*100);
  area.innerHTML=`
    <div class="progress-wrap">
      <div class="progress-label"><span>Question ${qIndex+1} of ${quizWords.length}</span><span>Score: ${qScore}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
    </div>
    <div class="mc-q">What does <strong>"${word.w}"</strong> <span style="color:var(--gold);font-size:14px;font-family:'DM Sans',sans-serif">(${word.t})</span> mean? <button class="pron-btn" onclick="pronounce('${word.w.replace(/'/g,"\\'")}',this)" title="British pronunciation">🔈</button></div>
    <div class="mc-options">${options.map(o=>`<button class="mc-opt" onclick="checkAnswer(this,'${o.replace(/'/g,"\\'")}','${word.d.replace(/'/g,"\\'")}','${word.w.replace(/'/g,"\\'")}')"><span>${o}</span></button>`).join('')}</div>
    <div class="mc-feedback" id="mcFeedback"></div>
    <button id="nextBtn" style="display:none" class="btn-next" onclick="nextQuestion()">Next →</button>
  `;
}

function checkAnswer(btn,chosen,correct,word){
  if(qAnswered)return;
  qAnswered=true;
  document.querySelectorAll('.mc-opt').forEach(b=>b.disabled=true);
  if(chosen===correct){
    btn.classList.add('correct');qScore++;
    document.getElementById('mcFeedback').textContent='✓ Correct!';
    document.getElementById('mcFeedback').style.color='var(--success)';
    stats.correct++;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.mc-opt').forEach(b=>{if(b.querySelector('span').textContent===correct)b.classList.add('correct');});
    document.getElementById('mcFeedback').textContent='✗ The answer is: '+correct;
    document.getElementById('mcFeedback').style.color='var(--danger)';
    stats.missed[word]=(stats.missed[word]||0)+1;
  }
  stats.total++;
  document.getElementById('nextBtn').style.display='inline-block';
}

function nextQuestion(){qIndex++;qAnswered=false;renderQuiz();}

function renderStats(){
  document.getElementById('stTotal').textContent=allWords.length;
  document.getElementById('stQuizzed').textContent=stats.total;
  const pct=stats.total>0?Math.round((stats.correct/stats.total)*100):0;
  document.getElementById('stScore').textContent=stats.total>0?pct+'%':'—';
  const missed=document.getElementById('missedList');
  missed.innerHTML='';
  const entries=Object.entries(stats.missed).sort((a,b)=>b[1]-a[1]).slice(0,20);
  if(entries.length===0){
    missed.innerHTML='<p style="color:var(--text-faint);font-size:14px;font-style:italic">No missed words yet — take the quiz!</p>';
    return;
  }
  entries.forEach(([word,count])=>{
    const span=document.createElement('span');
    span.className='missed-chip';
    span.textContent=word+' ×'+count;
    missed.appendChild(span);
  });
}

function resetStats(){
  stats={total:0,correct:0,missed:{}};
  renderStats();
}

renderWordList();
initFlash();
</script>
